# =============================================================================
# Configuracion adicional
# =============================================================================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vertivolatam
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/vertivo
  version:
    provider: mike
  generator: false

# =============================================================================
# Configuracion de desarrollo
# =============================================================================
dev_addr: 0.0.0.0:8000

# =============================================================================
# Archivos estaticos
# =============================================================================
extra_css:
  - stylesheets/vertivo-custom.css

extra_javascript:
  - javascripts/vertivo-custom.js
  - javascripts/mermaid.mjs
