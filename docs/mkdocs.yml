  - Backend:
    - Vision general: docs/backend/index.md
    - API Reference: docs/backend/api.md
    - Autenticacion: docs/backend/auth.md
    - MQTT Integration: docs/backend/mqtt.md
  - Mobile:
    - Vision general: docs/mobile/index.md
    - Arquitectura: docs/mobile/architecture.md
    - Design System: docs/mobile/design-system.md
  - IoT:
    - Vision general: docs/iot/index.md
    - Sensores Atlas Scientific: docs/iot/sensors.md
    - Orquestador: docs/iot/orchestrator.md
    - Simulacion: docs/iot/simulation.md
    - MQTT Topics: docs/iot/mqtt-topics.md
  - Pagos:
    - latam_payments: docs/pagos/latam-payments.md
    - Pasarelas LATAM: docs/pagos/pasarelas.md
  - Arquitectura:
    - Vision general: docs/architecture/overview.md
    - Tecnologias: docs/architecture/technologies.md
    - Flujo de datos: docs/architecture/data-flow.md
  - Despliegue:
    - Kubernetes: docs/deployment/kubernetes.md
