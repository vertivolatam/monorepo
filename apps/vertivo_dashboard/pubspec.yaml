name: vertivo_dashboard
description: Vertivo IoT Admin Dashboard — Jaspr SSR + D3.js

environment:
  sdk: ^3.8.0

resolution: workspace

dependencies:
  jaspr: ^0.22.4
  jaspr_router: ^0.8.1
  vertivo_client:
    path: ../vertivo_client
  serverpod_client: 3.4.1

dev_dependencies:
  build_runner: ^2.4.0
  build_web_compilers: ^4.4.6
  jaspr_builder: ^0.22.4
  jaspr_lints: ^0.6.1
  lints: ^5.0.0
  test: ^1.25.5

jaspr:
  mode: server
  # :8090 — Serverpod owns :8080 (the backend this dashboard calls). See
  # openspec/changes/2026-06-21-dashboard-fleet-cockpit/design.md §Puerto.
  port: 8090
