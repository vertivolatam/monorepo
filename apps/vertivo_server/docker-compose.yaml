services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: vertivo
      POSTGRES_PASSWORD: "dBD3foXPLDc29EHliGsERQNvrGtNK9cn"
    volumes:
      - vertivo_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "FEp_aqYAPRm0EYce92LvgT8PcxCbUdRb"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: vertivo_test
      POSTGRES_PASSWORD: "JchjR4zbW1DIb63GL4ZVwC7lu2_cNgqt"
    volumes:
      - vertivo_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "CKy-KomGTELI1AN6Ay8xwD9F8QMF4cu3"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  vertivo_data:
  vertivo_test_data:
