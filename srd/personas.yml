      revenue_impact: 6     # /10 — high volume persona, moderate individual spend
      engagement: 8          # /10 — daily app checks, photo sharing
      virality: 9            # /10 — primary referral engine (WhatsApp, Instagram)
      churn_risk: 3          # /10 — emotional attachment + kids involved

    churn_risk_moments:
