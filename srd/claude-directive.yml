# ─── ANTI-PATTERNS ────────────────────────────────────────────────────────────

anti_patterns:

  - name: backend_ahead_syndrome
    description: >
      Building more backend endpoints when existing ones have no frontend.
      13 Serverpod endpoint classes exist; 0 Flutter screens consume them.
    detection: "New endpoint created without corresponding Flutter screen in same PR."
    fix: "Create Flutter screen + provider that consumes the endpoint."
    severity: high

  - name: dashboard_theater
    description: >
      Jaspr dashboard pages with hardcoded D3.js synthetic data presented as real.
      6 pages, all hardcoded. Roberto would discover the farce in a POC.
    detection: "Dashboard page modified without connecting to Serverpod API."
    fix: "Connect page to real endpoint before adding new visualizations."
    severity: high

  - name: sensor_rich_action_poor
    description: >
      8 Atlas Scientific EZO sensors read data, 0 actuators control anything.
      The 'robot agrónomo' is actually a 'monitor agrónomo'.
    detection: "New sensor/monitor added without corresponding actuator control."
    fix: "Prioritize T2.1 (PID controllers, GPIO relay, dosing)."
    severity: medium

  - name: notification_model_without_delivery
    description: >
      NotificationDelivery table supports 7 channels (push, email, SMS, webhook,
      in_app, Slack, WhatsApp) but none actually send.
    detection: "NotificationDelivery record created without FCM/email/SMS send call."
    fix: "Implement at least FCM (T1.1) and email (T1.2)."
    severity: high

  - name: auth_without_identity
    description: >
      User can login but can't see profile, plan, or preferences in the app.
    detection: "Auth flow modified without profile screen existing."
    fix: "Include profile screen in T0.2 core screens."
    severity: medium

  - name: marketplace_zero
    description: >
      36% of MRR target has neither backend nor frontend.
      No order, product, or cart endpoints exist.
    detection: "Marketplace/order features discussed but not prioritized."
    fix: "VRTV-8 is T0 — must ship before T1 features."
    severity: critical

# ─── ACCEPTANCE CRITERIA ──────────────────────────────────────────────────────
# Minimum criteria for each tier to be considered "done".

acceptance_criteria:

  v0_2_0:
    label: "T0 — Billing + App MVP"
    deadline: "2026-06-22"
    must_have:
      - "User can purchase Vertivo Home ([precio redactado]) via OnvoPay/Tilopay"
      - "User can subscribe to SaaS plan ([ver pricing]) with recurring billing"
      - "Flutter app has 5 functional screens: home, greenhouse list, greenhouse detail, alerts, profile"
      - "GoRouter + Riverpod installed and working"
      - "Onboarding wizard: create account → pair device (QR) → name greenhouse → choose first crop"
      - "Greenhouse detail shows real sensor data from Serverpod (pH, temp, humidity, EC minimum)"
      - "Marketplace: browse Caja Vertivo tiers, subscribe, checkout"
      - "User can see their subscription plan in profile"
    nice_to_have:
      - "Push notification for first harvest"
      - "Email verification works (not just console.log)"
    test_with_persona: "María — can she buy, set up, monitor, and reorder without help?"

  v0_3_0:
    label: "T1 — Scale & Growth"
    deadline: "2026-08-31"
    must_have:
      - "FCM push notifications working (foreground + background)"
      - "Push templates: alert_critical, harvest_ready, reorder_reminder"
      - "Email sending real (SendGrid/SES) for verification + receipts"
      - "Landing page live at vertivo.com with pricing and checkout CTA"
      - "Referral system: generate link, track conversions, apply credits"
      - "Dashboard connected to real Serverpod API (0 hardcoded pages)"
      - "API key management for Commercial/Industrial plans"
      - "Multi-user roles: owner, admin, viewer"
      - "Order management: order status tracking, fulfillment flow"
      - "Fleet management screens in Flutter for multi-greenhouse users"
    nice_to_have:
      - "WhatsApp Business integration for support"
      - "Grafana dashboard for internal monitoring"
    test_with_persona: "Diego — can he manage 5 greenhouses, see ROI, invite his chef?"

  v0_4_0:
    label: "T2 — Differentiation"
    deadline: "2026-11-09"
    must_have:
      - "Robot agrónomo controls at least: pH dosing pump + LED photo-period"
      - "Harvest card generator with photo + data + Vertivo branding + share"
      - "Robot-calculated Caja recommendation based on sensor consumption data"
      - "ROI report PDF generation for Commercial/Industrial"
      - "Compliance report UI (traceability chain visualization)"
      - "Cross-user fleet view for agrónomo consultores"
      - "Expert Mode: robot suggests → agrónomo approves"
      - "WebSocket/SSE for real-time sensor data in Flutter"
    nice_to_have:
      - "Timelapse auto-generation from plant photos"
      - "Community feed of harvests"
    test_with_persona: "Lucía — can she monitor 20 clients and approve robot actions remotely?"

  v1_0_0:
    label: "T3 — Full Vision"
    deadline: "2026-12-14"
    must_have:
      - "Enjambre Data API with OpenAPI docs and SLA"
      - "At least 1 paying Data API customer"
      - "Product-as-a-Service billing flow (rental)"
      - "Bulk device provisioning for enterprise"
    nice_to_have:
      - "Urban-Farming-as-a-Service (food subscription)"
      - "Digital twins simulation engine"
      - "B2G procurement flow"
    test_with_persona: "Roberto — can he roll out to 15 locations and export data to SAP?"

# ─── DEVELOPMENT GUARDRAILS ──────────────────────────────────────────────────

guardrails:

  - name: no_new_endpoints_without_flutter_screen
    rule: >
      Do not create new Serverpod endpoints unless a Flutter screen or dashboard
      page will consume them in the same PR or the immediately following one.
    exceptions: ["MQTT ingestion endpoints", "background jobs", "webhook receivers"]

  - name: no_hardcoded_data_in_dashboard
    rule: >
      Every new dashboard page must connect to a real Serverpod endpoint.
      D3.js charts must be fed with API data, not synthetic generators.
    exceptions: ["Local development with --mock flag"]

  - name: rosa_test
    rule: >
      If Rosa (63yo, low tech savviness, WhatsApp only) cannot complete the flow
      with large text and simple language, the UX needs revision.
    applies_to: [onboarding, alerts, marketplace_checkout]

  - name: latam_payments_only
    rule: >
      Never integrate Stripe/PayPal as primary. Use latam_payments SDK:
      OnvoPay/Tilopay (CR/PA), Wompi (CO), SPEI/OXXO (MX), PIX (BR).
    reference: "altrupets-monorepo/apps/mobile/lib/core/payments/latam_payments.dart"

  - name: aeroponic_not_hydroponic
    rule: >
      The product uses nebuponía (aeroponics by nebulization), NOT hydroponics.
      Never refer to the system as hydroponic in code, UI, docs, or comments.

  - name: semver_gate
    rule: >
      Do not merge T1 features until all T0 issues are Done.
      Do not merge T2 features until all T1 issues are Done.
      Exceptions require explicit product owner approval.

  - name: linear_taxonomy
    rule: >
      All Linear issues must have at minimum: Type label + Size label (from
      AGENTS.md taxonomy). T0-T3 tier labels are additive, not replacement.
    reference: "AGENTS.md section 'Linear MCP — Taxonomía Obligatoria de Labels'"

