# Section 5 — Claude Directive
# Machine-readable SRD rules for development prioritization.
# Used by srd-guardian agent and any Claude session working on this monorepo.
#
# Source: srd/gap-audit.md, srd/journeys.md, srd/business-model-canvas.md, srd/success-reality.md

meta:
  product: Vertivo — Micro-invernaderos Autónomos Aeropónicos Urbanos
  target: [MRR target] MRR at 18 months
  geo_launch_order: [CR, PA, CO, MX, BR]
  monorepo_version: 0.1.0
  last_updated: "2026-03-09"

# ─── PRIORITY RULES ──────────────────────────────────────────────────────────

priority_rules:

  - rule: billing_first
    description: >
      Billing (latam_payments) is the #1 priority. Without payment processing,
      revenue = $0. Every other feature depends on the ability to charge.
    linear_issue: VRTV-5
    tier: T0
    blocks: [VRTV-8]
    journeys: [J1, J4]
    revenue_at_risk: "100%"

  - rule: flutter_screens_before_new_endpoints
    description: >
      The backend has 13 endpoint classes with 0 Flutter screens consuming them.
      Anti-pattern: "backend-ahead syndrome". Prioritize connecting existing
      endpoints to UI over building new backend features.
    anti_pattern: backend_ahead_syndrome
    tier: T0
    linear_issues: [VRTV-6, VRTV-7]

  - rule: push_before_features
    description: >
      32% of conversions come from "first harvest" push. 24% from "robot saved
      your plants" push. FCM integration should be prioritized over new features
      because it multiplies the value of everything already built.
    linear_issue: VRTV-9
    tier: T1
    journeys: [J1, J2, J3, J4, J8]

  - rule: marketplace_is_36_percent
    description: >
      Marketplace (Caja Vertivo + on-demand) represents 36% of MRR target.
      It must ship within T0 timeline. Reuse billing from VRTV-5.
    linear_issue: VRTV-8
    tier: T0
    revenue_at_risk: "[monto redactado]/mo"

  - rule: never_ship_dashboard_without_real_data
    description: >
      The Jaspr dashboard has 6 pages with hardcoded synthetic data. Never demo
      to enterprise prospects (Roberto) without connecting to real API first.
      Anti-pattern: "dashboard theater".
    anti_pattern: dashboard_theater
    linear_issue: VRTV-13
    tier: T1

  - rule: referral_before_paid_acquisition
    description: >
      18% referral rate target. 40% of device sales via referral. Build organic
      growth engine before spending on paid acquisition channels.
    linear_issue: VRTV-12
    tier: T1

