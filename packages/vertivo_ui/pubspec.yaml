name: vertivo_ui
description: "Shared Vertivo UI package — Atomic Design widgets, theme y design tokens."
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '^3.8.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <7.0.0'

flutter:
  uses-material-design: true
  assets:
    - assets/style_dictionary/tokens.json
