apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: vertivo-backend
spec:
  type: ClusterIP
  selector:
    app: vertivo-backend
  ports:
    - name: api
      port: 8080
      targetPort: api
    - name: insights
      port: 8081
      targetPort: insights
    - name: web
      port: 8082
      targetPort: web
