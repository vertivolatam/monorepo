apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vertivo-dev

resources:
  - ../../../base/backend

patches:
  - target:
      kind: Deployment
      name: vertivo-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/metadata/labels/environment
        value: dev
