apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vertivo-dev

resources:
  - ../../../base/mqtt
  # Workaround Service: emqx-operator 2.3.1 ↔ emqx 5.8.6 incompatibility means
  # the operator never creates `emqx-listeners`. See the file header for details.
  - emqx-listeners-service.yaml

patches:
  - target:
      kind: EMQX
      name: emqx
    patch: |
      - op: replace
        path: /spec/coreTemplate/spec/replicas
        value: 1
      - op: add
        path: /metadata/labels/environment
        value: dev
