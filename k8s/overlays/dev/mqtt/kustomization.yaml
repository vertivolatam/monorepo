apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vertivo-dev

resources:
  - ../../../base/mqtt

patches:
  - target:
      kind: EMQX
      name: emqx
    patch: |
      - op: replace
        path: /spec/coreTemplate/spec/replicas
        value: 1
      - op: add
        path: /metadata/labels/environment
        value: dev
